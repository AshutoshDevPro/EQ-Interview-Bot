version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PYTHON_AI_URL=http://python:8000
    depends_on:
      - python

  python:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./python-service/emotion_model.h5:/app/emotion_model.h5:ro
      - ./python-service/yolov8n-face.pt:/app/yolov8n-face.pt:ro
